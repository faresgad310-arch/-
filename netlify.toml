[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[dev]
  port = 8888
  publish = "public"

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
